<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okey 101 Canlı Skor Tahtası</title>
    <!-- Outfit Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --accent-green: #4ADE80;
            --accent-red: #F87171;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --glow-color: rgba(74, 222, 128, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 16px;
        }

        /* Top Header styling */
        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #F1F5F9 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            border: 1px solid var(--border-color);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-secondary);
        }

        .live-badge.online .live-dot {
            background-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 1.5s infinite alternate;
        }

        .live-badge.offline .live-dot {
            background-color: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        /* Main Container styling */
        main {
            width: 100%;
            max-width: 500px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Team Headers Card */
        .teams-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24);
        }

        .teams-row {
            display: flex;
            align-items: center;
            text-align: center;
        }

        .team-name {
            flex: 1;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .divider {
            width: 1px;
            height: 32px;
            background-color: var(--border-color);
        }

        /* Rounds Score List Card */
        .rounds-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24);
            min-height: 250px;
        }

        .rounds-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .rounds-list {
            flex: 1;
            overflow-y: auto;
            max-height: 50vh;
        }

        .round-row {
            display: flex;
            align-items: center;
            height: 56px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .round-row:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.015);
        }

        .round-cell {
            flex: 1;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .round-cell.penalty-light {
            background-color: rgba(239, 68, 68, 0.15);
            color: #F87171;
            border-radius: 8px;
            margin: 4px;
            height: calc(100% - 8px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .round-cell.penalty-dark {
            background-color: rgba(153, 27, 27, 0.3);
            color: #F87171;
            border-radius: 8px;
            margin: 4px;
            height: calc(100% - 8px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Bottom Sum Row Card */
        .sum-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            border: 2px solid var(--border-color);
            padding: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
        }

        .sum-title {
            text-align: center;
            font-size: 11px;
            font-weight: 900;
            color: var(--text-secondary);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .sum-row {
            display: flex;
            align-items: center;
            text-align: center;
        }

        .sum-value {
            flex: 1;
            font-size: 32px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Empty/Warning States */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            gap: 16px;
            flex: 1;
        }

        .empty-icon {
            font-size: 48px;
        }

        .empty-text {
            font-weight: 800;
            font-size: 18px;
            color: var(--text-primary);
        }

        .empty-subtext {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 18px;
        }

        .room-badge {
            background: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(74, 222, 128, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 13px;
        }

        /* Room Login Styling */
        .input-container {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-top: 10px;
        }

        .input-container input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            font-size: 18px;
            color: var(--text-primary);
            text-align: center;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .input-container input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.15);
        }

        .input-container button {
            background-color: var(--accent-green);
            color: #0F172A;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        /* Animations */
        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        .score-change {
            animation: bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .sum-value {
                font-size: 28px;
            }
            .team-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <header>
        <span class="logo">OKEY 101</span>
        <div id="connectionStatus" class="live-badge offline">
            <span class="live-dot"></span>
            <span id="statusText">ÇEVRİMDİŞİ</span>
        </div>
    </header>

    <main id="appContainer">
        <!-- Renders dynamically -->
    </main>

    <script>
        const appContainer = document.getElementById('appContainer');
        const connectionStatus = document.getElementById('connectionStatus');
        const statusText = document.getElementById('statusText');

        // Extract Room Code from URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');

        let lastData = null;

        if (!roomId) {
            renderRoomInputForm();
        } else {
            initSSEConnection(roomId);
        }

        function renderRoomInputForm() {
            connectionStatus.style.display = "none";
            appContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📡</div>
                    <div class="empty-text">CANLI YAYINA BAĞLAN</div>
                    <div class="empty-subtext" style="margin-bottom: 20px;">6 haneli oda kodunu girerek okey masasını canlı izleyebilirsiniz:</div>
                    
                    <div class="input-container">
                        <input type="tel" id="roomInput" placeholder="Örn: 481920" maxlength="6" pattern="[0-9]*" inputmode="numeric">
                        <button id="joinBtn">BAĞLAN</button>
                    </div>
                    <div id="inputError" style="color: var(--accent-red); font-size: 13px; margin-top: 10px; font-weight: bold; display: none;">Lütfen 6 haneli geçerli bir kod girin.</div>
                </div>
            `;

            const roomInput = document.getElementById('roomInput');
            const joinBtn = document.getElementById('joinBtn');
            const inputError = document.getElementById('inputError');

            joinBtn.addEventListener('click', () => {
                const code = roomInput.value.trim();
                if (code.length === 6 && /^[0-9]+$/.test(code)) {
                    window.location.search = `?room=${code}`;
                } else {
                    inputError.style.display = 'block';
                }
            });

            roomInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    joinBtn.click();
                }
            });
        }

        function initSSEConnection(room) {
            connectionStatus.style.display = "flex";
            statusText.innerText = "BAĞLANIYOR...";
            connectionStatus.className = "live-badge offline";

            // Connect to ntfy.sh server-sent events for our dedicated topic
            const eventSource = new EventSource(`https://ntfy.sh/okey101_room_${room}/sse`);

            eventSource.onopen = () => {
                statusText.innerText = `CANLI (${room})`;
                connectionStatus.className = "live-badge online";
            };

            eventSource.onerror = () => {
                statusText.innerText = "BAĞLANTI KESİLDİ";
                connectionStatus.className = "live-badge offline";
            };

            eventSource.onmessage = (e) => {
                try {
                    const eventData = JSON.parse(e.data);
                    // ntfy.sh sends published payload inside "message" key
                    if (eventData.event === "message" && eventData.message) {
                        const data = JSON.parse(eventData.message);
                        updateScoreBoard(data);
                    }
                } catch (err) {
                    console.error("Payload parse error:", err);
                }
            };
        }

        function updateScoreBoard(data) {
            // Check if rounds are empty or payload corrupt
            if (!data.rounds || data.rounds.length === 0) {
                appContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⏳</div>
                        <div class="empty-text">SKORLAR BEKLENİYOR...</div>
                        <div class="empty-subtext">Yayın başarıyla bağlandı. Skorlar girildiğinde ekran anında güncellenecektir.</div>
                        <span class="room-badge">ODA: ${roomId}</span>
                    </div>
                `;
                return;
            }

            const team1 = data.teamNames[0] || "BİZ";
            const team2 = data.teamNames[1] || "ONLAR";
            const sum1 = data.sums[0] || 0;
            const sum2 = data.sums[1] || 0;
            const diff = Math.abs(sum1 - sum2);

            // Dynamic color selection based on who is leading
            let dynamicStyle = "";
            if (sum1 < sum2) {
                // Team 1 leading -> Glow green
                document.documentElement.style.setProperty('--glow-color', 'rgba(74, 222, 128, 0.2)');
                dynamicStyle = `box-shadow: 0 0 20px rgba(74, 222, 128, 0.25); border-color: rgba(74, 222, 128, 0.4);`;
            } else if (sum2 < sum1) {
                // Team 2 leading -> Glow red
                document.documentElement.style.setProperty('--glow-color', 'rgba(248, 113, 113, 0.2)');
                dynamicStyle = `box-shadow: 0 0 20px rgba(248, 113, 113, 0.25); border-color: rgba(248, 113, 113, 0.4);`;
            } else {
                // Tie -> Neutral border
                dynamicStyle = `border-color: rgba(255, 255, 255, 0.15);`;
            }

            // Create Rounds Rows HTML
            let roundsHtml = "";
            data.rounds.forEach((round, index) => {
                const cell1Class = getCellClass(round.score1);
                const cell2Class = getCellClass(round.score2);
                
                const val1 = round.score1 === 0 && !round.isScore1Entered ? "" : round.score1;
                const val2 = round.score2 === 0 && !round.isScore2Entered ? "" : round.score2;

                const emoji1 = round.score1 === -202 ? " 🔥" : "";
                const emoji2 = round.score2 === -202 ? " 🔥" : "";

                roundsHtml += `
                    <div class="round-row">
                        <div class="round-cell ${cell1Class}">${val1}${emoji1}</div>
                        <div class="round-cell ${cell2Class}">${val2}${emoji2}</div>
                    </div>
                `;
            });

            // Re-render complete Main Container
            appContainer.innerHTML = `
                <!-- Dynamic Teams Header -->
                <div class="teams-card">
                    <div class="teams-row">
                        <div class="team-name">${team1}</div>
                        <div class="divider"></div>
                        <div class="team-name">${team2}</div>
                    </div>
                </div>

                <!-- Scrollable Rounds -->
                <div class="rounds-card">
                    <div class="rounds-header">EL SKORLARI</div>
                    <div class="rounds-list" id="roundsList">
                        ${roundsHtml}
                    </div>
                </div>

                <!-- Sum & Win Card -->
                <div class="sum-card" style="${dynamicStyle}">
                    <div class="sum-title">TOPLAM (${data.rounds.length} El)</div>
                    <div class="sum-row">
                        <div class="sum-value" style="color: ${sum1 < 0 ? 'var(--accent-red)' : 'var(--accent-green)'}">${sum1}</div>
                        <div class="divider" style="height: 40px"></div>
                        <div class="sum-value" style="color: ${sum2 < 0 ? 'var(--accent-red)' : 'var(--accent-green)'}">${sum2}</div>
                    </div>
                </div>
            `;

            // Auto-scroll to the bottom round
            const roundsList = document.getElementById('roundsList');
            if (roundsList) {
                roundsList.scrollTop = roundsList.scrollHeight;
            }

            // Animate sum text on score updates
            if (lastData && (lastData.sums[0] !== sum1 || lastData.sums[1] !== sum2)) {
                const values = document.querySelectorAll('.sum-value');
                values.forEach(el => el.classList.add('score-change'));
                setTimeout(() => {
                    values.forEach(el => el.classList.remove('score-change'));
                }, 500);
            }

            lastData = data;
        }

        function getCellClass(value) {
            if (value === -101) return "round-cell penalty-light";
            if (value === -202) return "round-cell penalty-dark";
            return "";
        }
    </script>
</body>
</html>
